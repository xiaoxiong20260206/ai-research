<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>数字员工 · 飞书机器人 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root {
  --fs-blue: #3370FF;
  --fs-blue-light: #E8F0FF;
  --fs-blue-hover: #2B5CE6;
  --fs-bg: #F0F2F5;
  --fs-surface: #FFFFFF;
  --fs-border: #E5E6EB;
  --fs-text: #1F2329;
  --fs-text-2: #646A73;
  --fs-text-3: #8F959E;
  --fs-green: #34C724;
  --fs-green-bg: #E8F8E5;
  --fs-red: #F54A45;
  --fs-red-bg: #FDEEED;
  --fs-orange: #FF7D00;
  --fs-orange-bg: #FFF3E8;
  --fs-purple: #7B61FF;
  --fs-purple-bg: #F0ECFF;
  --fs-radius: 8px;
  --f-display: 'Sora', 'PingFang SC', sans-serif;
  --f-body: 'Figtree', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:var(--f-body);background:var(--fs-bg);color:var(--fs-text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#D0D3D8;border-radius:10px}
button{cursor:pointer;font-family:var(--f-body)}
input,textarea{font-family:var(--f-body)}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:260px;min-width:260px;background:var(--fs-surface);border-right:1px solid var(--fs-border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:16px;border-bottom:1px solid var(--fs-border)}
.sidebar-title{font-family:var(--f-display);font-size:14px;font-weight:700;color:var(--fs-text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.sidebar-sub{font-size:12px;color:var(--fs-text-3)}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--fs-radius);cursor:pointer;transition:all .14s;color:var(--fs-text-2);font-size:13.5px}
.nav-item:hover{background:var(--fs-bg)}
.nav-item.active{background:var(--fs-blue-light);color:var(--fs-blue);font-weight:600}
.nav-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.nav-badge{background:var(--fs-red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:20px;min-width:18px;text-align:center;margin-left:auto}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{height:56px;background:var(--fs-surface);border-bottom:1px solid var(--fs-border);display:flex;align-items:center;padding:0 20px;gap:12px}
.chat-header-name{font-weight:600;font-size:15px}
.chat-header-status{font-size:12px;color:var(--fs-green);display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--fs-green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;animation:msgIn .18s ease}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--fs-bg);border:1px solid var(--fs-border)}
.msg-avatar.bot{background:linear-gradient(135deg,#FFFBEB,#FDE68A);border-color:#FCD34D}
.msg-content{max-width:70%}
.msg-name{font-size:11px;color:var(--fs-text-3);margin-bottom:4px}
.msg.user .msg-name{text-align:right}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:13.5px;line-height:1.65}
.msg-bubble.bot{background:var(--fs-surface);border:1px solid var(--fs-border);border-top-left-radius:4px}
.msg-bubble.user{background:var(--fs-blue);color:#fff;border-top-right-radius:4px}
.msg-time{font-size:10px;color:var(--fs-text-3);margin-top:4px}
.msg.user .msg-time{text-align:right}

/* Card Messages */
.card-msg{background:var(--fs-surface);border:1px solid var(--fs-border);border-radius:var(--fs-radius);overflow:hidden;max-width:400px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-msg-header{padding:12px 14px;border-bottom:1px solid var(--fs-border);display:flex;align-items:center;gap:8px}
.card-msg-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.card-msg-title{font-weight:600;font-size:13.5px;flex:1}
.card-msg-body{padding:12px 14px;font-size:12.5px;color:var(--fs-text-2);line-height:1.6}
.card-msg-footer{padding:8px 14px;border-top:1px solid var(--fs-border);display:flex;gap:6px;background:var(--fs-bg)}
.card-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;border:none;transition:all .14s}
.card-btn-primary{background:var(--fs-blue);color:#fff}
.card-btn-primary:hover{background:var(--fs-blue-hover)}
.card-btn-outline{background:var(--fs-surface);color:var(--fs-text);border:1px solid var(--fs-border)}
.card-btn-outline:hover{background:var(--fs-bg)}
.card-btn-danger{background:var(--fs-red-bg);color:var(--fs-red);border:1px solid #FECACA}

/* Progress card */
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.progress-label{font-size:11px;color:var(--fs-text-3);width:60px}
.progress-bar{flex:1;height:6px;background:var(--fs-border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.progress-blue{background:var(--fs-blue)}
.progress-green{background:var(--fs-green)}
.progress-orange{background:var(--fs-orange)}

/* Stat row */
.stat-row{display:flex;gap:12px;margin-bottom:10px}
.stat-item{flex:1;text-align:center;padding:8px;background:var(--fs-bg);border-radius:6px}
.stat-val{font-family:var(--f-display);font-weight:700;font-size:18px;color:var(--fs-blue)}
.stat-label{font-size:10px;color:var(--fs-text-3);margin-top:2px}

/* Badge */
.fs-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
.fs-badge-blue{background:var(--fs-blue-light);color:var(--fs-blue)}
.fs-badge-green{background:var(--fs-green-bg);color:var(--fs-green)}
.fs-badge-red{background:var(--fs-red-bg);color:var(--fs-red)}
.fs-badge-orange{background:var(--fs-orange-bg);color:var(--fs-orange)}
.fs-badge-purple{background:var(--fs-purple-bg);color:var(--fs-purple)}

/* Diff */
.diff-block{background:#F7F8FA;border:1px solid var(--fs-border);border-radius:6px;padding:8px 10px;font-family:'Courier New',monospace;font-size:11.5px;margin:8px 0}
.diff-add{color:#34C724}
.diff-rm{color:#F54A45}

/* Chat input */
.chat-foot{padding:12px 16px;border-top:1px solid var(--fs-border);background:var(--fs-surface)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-field{flex:1;padding:8px 12px;background:var(--fs-surface);border:1px solid var(--fs-border);border-radius:var(--fs-radius);font-size:13.5px;outline:none;resize:none;min-height:38px;max-height:100px;transition:border-color .15s}
.chat-field:focus{border-color:var(--fs-blue)}
.chat-send{width:36px;height:36px;border-radius:var(--fs-radius);background:var(--fs-blue);color:#fff;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .14s;flex-shrink:0}
.chat-send:hover{background:var(--fs-blue-hover)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.quick-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.quick-pill{padding:4px 10px;background:var(--fs-bg);border:1px solid var(--fs-border);border-radius:20px;font-size:12px;color:var(--fs-text-2);cursor:pointer;transition:all .13s}
.quick-pill:hover{background:var(--fs-blue-light);border-color:var(--fs-blue);color:var(--fs-blue)}

/* Typing */
.typing{display:flex;gap:3px;align-items:center;padding:4px 0}
.typing span{width:5px;height:5px;background:var(--fs-text-3);border-radius:50%;animation:typ 1.1s infinite}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes typ{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}

/* Demo console */
.demo-console{padding:12px 16px;border-top:1px solid var(--fs-border);background:var(--fs-bg)}
.console-label{font-size:10px;font-weight:600;color:var(--fs-text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.console-select{width:100%;padding:5px 8px;font-size:11.5px;border-radius:6px;border:1px solid var(--fs-border);background:var(--fs-surface);color:var(--fs-text);cursor:pointer;font-family:var(--f-body);margin-bottom:6px}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--fs-surface);border:1px solid var(--fs-blue);border-radius:10px;padding:10px 18px;box-shadow:0 6px 20px rgba(0,0,0,.12);display:flex;align-items:center;gap:8px;font-size:13px;animation:toastIn .2s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Web link */
.web-link{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--fs-bg);border-radius:6px;margin-top:8px;cursor:pointer;transition:background .13s;font-size:12px;color:var(--fs-blue);text-decoration:none}
.web-link:hover{background:var(--fs-blue-light)}
</style>
</head>
<body>

    if(l.includes('review')||l.includes('pr')||l.includes('代码'))

      return `**张晓雯 面试评估**\n\n综合评分：4.2/5.0\n✅ 系统设计能力突出\n✅ 大厂背景，经验丰富\n⚠️ 稳定性待考察\n\n建议：推荐进入二面`;
    if(l.includes('入职')||l.includes('进度'))
      return `**王天明入职进度**\n\n✅ 邮箱/OA/代码仓已开通\n✅ VPN 权限已开通\n⚡ IT 设备领取（明日 10:00）\n○ 培训日程协调中\n○ 导师分配待确认\n\n完成度：40%`;
    if(l.includes('招聘')||l.includes('数据'))
      return `**本周招聘数据**\n\n简历收到：47 份\nAI 初筛通过：12 份（25.5%）\n面试安排：3 场\n待发 Offer：1 份`;
  }
  if(role==='finance'){
    if(l.includes('对账')||l.includes('进度'))
      return `**月末对账进度**\n\n✅ 银行流水拉取完成\n⚡ 自动匹配：89%（3,891/4,370 笔）\n⚠️ 151 笔差异待审核\n  - 3 笔大额（>50万）\n\n预计今日 16:00 完成关账报告`;
    if(l.includes('信披')||l.includes('报告'))
      return `**信披报告进度**\n\n基金数据采集：✅ 完成\n报告模板填充：⚡ 进行中\n数据交叉验证：○ 待执行\n\n截止日还剩 3 天`;
    if(l.includes('差异'))
      return `**本月差异分析**\n\n差异率：2.1%（上月 1.3%）\n主要原因：\n1. 跨期调整 42 笔\n2. 银行手续费 28 笔\n3. 待确认 81 笔\n\n建议：重点复核大额差异`;
  }
  if(role==='legal'){
    if(l.includes('合同')||l.includes('审查'))
      return `**合同审查结果**\n\n🔴 高风险 3 项\n- 违约上限仅 10%\n- 知识产权归属模糊\n- 解约通知期仅 7 天\n\n🟡 需关注 5 项\n🟢 合规亮点 2 项\n\n修改建议已生成`;
    if(l.includes('法规')||l.includes('检索'))
      return `**相关法规检索**\n\n匹配到 3 条相关法规：\n1. 《私募投资基金监督管理暂行办法》第23条\n2. 《基金合同》标准条款 v3.0\n3. 《反洗钱法》相关条款\n\n需要详细内容吗？`;
    if(l.includes('修改'))
      return `**合同修改建议**\n\n已生成修改对照表：\n✏️ 第8条：违约上限 10% → 30%\n✏️ 第12条：明确知识产权归属\n✏️ 第15条：解约通知期 7天 → 30天\n\n确认后可发送给对方`;
  }
  if(role==='ops'){
    if(l.includes('nav')||l.includes('状态'))
      return `**今日 NAV 监控**\n\n量化1号：正常（偏差 0.02%）\n量化2号：⚠️ 偏差 0.3%（已告警）\n量化3号：⚠️ 偏差 0.25%（连续2日）\n\n整体：2/3 正常`;
    if(l.includes('报表')||l.includes('周度'))
      return `**周度运营报表**\n\n数据采集：85% 完成\n预计出稿：今日下午\n\n关键指标预览：\n日活 ↑2.3%\n转化率 持平\n收入 ↑1.8%`;
    if(l.includes('趋势')||l.includes('指标'))
      return `**关键指标趋势（近7日）**\n\nDAU：12,345 → 12,630（↑2.3%）\n转化率：3.2% → 3.2%（持平）\n客单价：¥156 → ¥162（↑3.8%）\n\n总体趋势向好，建议关注转化率优化`;
  }
  return '好的，我来处理这个任务。需要更多具体信息吗？';
}

/* ─── Toast ─── */
let _toastTimer=null;
function showToast(msg){
  let el=document.getElementById('global-toast');
  if(!el){el=document.createElement('div');el.id='global-toast';document.body.appendChild(el);}
  el.innerHTML=`<div class="toast">💡 ${msg}</div>`;
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{if(el)el.innerHTML='';},2500);
}

/* ─── Card Components ─── */
function TaskProgressCard({data}){
  return(
    <div className="card-msg">
      <div className="card-msg-header">
        <div className="card-msg-icon" style={{background:data.iconBg}}>{data.icon}</div>
        <div className="card-msg-title">{data.title}</div>
      </div>
      <div className="card-msg-body">
        <div className="stat-row">
          {data.stats.map(s=>(
            <div key={s.label} className="stat-item">
              <div className="stat-val" style={{color:s.color}}>{s.val}</div>
              <div className="stat-label">{s.label}</div>
            </div>
          ))}
        </div>
        {data.tasks.map((t,i)=>(
          <div key={i} style={{marginBottom:8,padding:'8px 0',borderBottom:i<data.tasks.length-1?'1px solid var(--fs-border)':'none'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <span style={{fontSize:12.5,fontWeight:500}}>{t.name}</span>
              <span className={`fs-badge fs-badge-${t.badgeType}`}>{t.badge}</span>
            </div>
            <div className="progress-bar">
              <div className={`progress-fill progress-${t.badgeType==='green'?'green':'blue'}`} style={{width:`${t.pct}%`}}/>
            </div>
          </div>
        ))}
        <div style={{fontSize:11,color:'var(--fs-text-3)',marginTop:4}}>{data.footer}</div>
      </div>
      <div className="card-msg-footer">
        <button className="card-btn card-btn-primary" onClick={()=>showToast('正在打开 Web 工作台...')}>打开工作台</button>
        <button className="card-btn card-btn-outline" onClick={()=>showToast('已标记为已读')}>已读</button>
      </div>
    </div>
  );
}

function HilCard({data,onAction}){
  const [acted,setActed]=useState(false);
  if(acted)return(
    <div className="card-msg">
      <div className="card-msg-body" style={{textAlign:'center',padding:'16px',color:'var(--fs-green)'}}>
        ✅ 审批已确认，任务继续执行
      </div>
    </div>
  );
  return(
    <div className="card-msg" style={{borderColor:'var(--fs-orange)'}}>
      <div className="card-msg-header" style={{background:'var(--fs-orange-bg)'}}>
        <div className="card-msg-icon" style={{background:'var(--fs-orange-bg)',color:'var(--fs-orange)'}}>⏸</div>
        <div className="card-msg-title" style={{color:'var(--fs-orange)'}}>{data.title}</div>
        <span className="fs-badge fs-badge-orange">{data.subtitle}</span>
      </div>
      <div className="card-msg-body">
        <div style={{marginBottom:8,whiteSpace:'pre-line'}}>{data.body}</div>
        <div className="diff-block">
          {data.diff.map((d,i)=>d.add
            ?<div key={i} className="diff-add">{d.add}</div>
            :<div key={i} className="diff-rm">{d.rm}</div>
          )}
          <div style={{color:'var(--fs-text-3)',marginTop:4}}>  目标: {data.target}</div>
        </div>
      </div>
      <div className="card-msg-footer">
        <button className="card-btn card-btn-primary" onClick={()=>{setActed(true);onAction?.('approve');}}>✓ 确认</button>
        <button className="card-btn card-btn-outline" onClick={()=>showToast('修改后提交')}>修改</button>
        <button className="card-btn card-btn-danger" onClick={()=>{setActed(true);onAction?.('reject');}}>取消</button>
      </div>
    </div>
  );
}

/* ─── 群聊列表 ─── */
const CHATS = [
  {id:'bot',name:'数字员工 · 小助手',icon:'🦞',isBot:true,unread:2,sub:'今日 2 项待处理'},
  {id:'team',name:'研效团队群',icon:'💬',isBot:false,unread:0,sub:'张伟: PR#2847 已合并'},
  {id:'hr-group',name:'HR 工作群',icon:'👩',isBot:false,unread:0,sub:'陈静: 面试安排已发送'},
  {id:'all',name:'全员通知',icon:'📢',isBot:false,unread:0,sub:'系统: 本周五下午团建'},
];

/* ─── Main App ─── */
function App(){
  const [currentRole,setCurrentRole]=useState('dev');
  const [activeChat,setActiveChat]=useState('bot');
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [scenarioPlayed,setScenarioPlayed]=useState({});
  const endRef=useRef(null);

  const roleObj=ROLES.find(r=>r.id===currentRole)||ROLES[0];

  // Play scenario on role change
  useEffect(()=>{
    if(activeChat!=='bot')return;
    if(scenarioPlayed[currentRole])return;
    setMessages([]);
    const scenario=ROLE_SCENARIOS[currentRole]||[];
    let timers=[];
    let cumulativeDelay=0;
    scenario.forEach((item)=>{
      cumulativeDelay+=item.delay;
      const timer=setTimeout(()=>{
        setMessages(prev=>[...prev,item]);
      },cumulativeDelay);
      timers.push(timer);
    });
    setScenarioPlayed(prev=>({...prev,[currentRole]:true}));
    return ()=>timers.forEach(clearTimeout);
  },[currentRole,activeChat]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages,loading]);

  const handleRoleChange=(newRole)=>{
    setCurrentRole(newRole);
    setActiveChat('bot');
    setMessages([]);
    setScenarioPlayed(prev=>{const next={...prev};delete next[newRole];return next;});
    const r=ROLES.find(x=>x.id===newRole);
    if(r)showToast(`已切换为: ${r.icon} ${r.label}（${r.person}）`);
  };

  const send=useCallback(async(text)=>{
    if(!text.trim()||loading)return;
    setMessages(prev=>[...prev,{type:'user',content:text}]);
    setInput('');setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    const reply=mockReply(text,currentRole);
    setMessages(prev=>[...prev,{type:'bot-text',content:reply}]);
    setLoading(false);
  },[loading,currentRole]);

  const quickPills=ROLE_QUICK[currentRole]||[];

  return(
    <div className="app">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-head">
          <div className="sidebar-title">
            <span style={{fontSize:20}}>💬</span>飞书消息
          </div>
          <div className="sidebar-sub">Digital Employee · 飞书 Bot Demo</div>
        </div>
        <div className="sidebar-nav">
          {CHATS.map(c=>(
            <div key={c.id} className={`nav-item ${activeChat===c.id?'active':''}`} onClick={()=>setActiveChat(c.id)}>
              <div className="nav-icon" style={{background:c.isBot?'linear-gradient(135deg,#FFFBEB,#FDE68A)':c.id==='team'?'var(--fs-blue-light)':'var(--fs-bg)',border:`1px solid ${c.isBot?'#FCD34D':'var(--fs-border)'}`}}>
                {c.icon}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:500,fontSize:13,marginBottom:1}}>{c.name}</div>
                <div style={{fontSize:11,color:'var(--fs-text-3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.sub}</div>
              </div>
              {c.unread>0&&<span className="nav-badge">{c.unread}</span>}
            </div>
          ))}
        </div>

        <div className="demo-console">
          <div className="console-label">Demo 控制台 · 切换角色</div>
          <select className="console-select" value={currentRole} onChange={e=>handleRoleChange(e.target.value)}>
            {ROLES.map(r=><option key={r.id} value={r.id}>{r.icon} {r.label}（{r.person}）</option>)}
          </select>
          <div style={{fontSize:11,color:'var(--fs-text-3)',lineHeight:1.5}}>
            切换角色后，对话内容将模拟该角色的工作场景
          </div>
        </div>
      </aside>

      {/* Main chat */}
      <main className="main">
        <div className="chat-header">
          <div className="nav-icon" style={{width:40,height:40,background:'linear-gradient(135deg,#FFFBEB,#FDE68A)',border:'1px solid #FCD34D'}}>🦞</div>
          <div>
            <div className="chat-header-name">数字员工 · 小助手</div>
            <div className="chat-header-status"><div className="status-dot"/>在线 · 为 {roleObj.person} 服务</div>
          </div>
          <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:'var(--fs-bg)',borderRadius:20,fontSize:12}}>
              <span>{roleObj.icon}</span>
              <span style={{fontWeight:600}}>{roleObj.person}</span>
              <span style={{color:'var(--fs-text-3)'}}>{roleObj.dept}</span>
            </div>
            <a href="digital_employee_web_v2.html" target="_blank" className="card-btn card-btn-outline" style={{textDecoration:'none',fontSize:12,padding:'4px 10px'}}>
              🖥️ 打开 Web 端
            </a>
          </div>
        </div>

        <div className="messages">
          {messages.map((m,i)=>{
            if(m.type==='user')return(
              <div key={i} className="msg user">
                <div className="msg-avatar">{roleObj.icon}</div>
                <div className="msg-content">
                  <div className="msg-name">{roleObj.person}</div>
                  <div className="msg-bubble user">{m.content}</div>
                  <div className="msg-time">{new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              </div>
            );
            if(m.type==='bot-text')return(
              <div key={i} className="msg">
                <div className="msg-avatar bot">🦞</div>
                <div className="msg-content">
                  <div className="msg-name">小助手</div>
                  <div className="msg-bubble bot" dangerouslySetInnerHTML={{__html:m.content
                    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                    .replace(/`([^`]+)`/g,'<code style="background:var(--fs-bg);padding:1px 4px;border-radius:3px;font-size:11.5px;color:var(--fs-blue)">$1</code>')
                    .replace(/\n/g,'<br/>')}}/>
                  <div className="msg-time">{new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              </div>
            );
            if(m.type==='bot-card'&&m.card==='task-progress')return(
              <div key={i} className="msg">
                <div className="msg-avatar bot">🦞</div>
                <div className="msg-content">
                  <div className="msg-name">小助手</div>
                  <TaskProgressCard data={m.data}/>
                  <div className="msg-time">{new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              </div>
            );
            if(m.type==='bot-card'&&m.card==='hil')return(
              <div key={i} className="msg">
                <div className="msg-avatar bot">🦞</div>
                <div className="msg-content">
                  <div className="msg-name">小助手</div>
                  <HilCard data={m.data} onAction={(a)=>showToast(a==='approve'?'✅ 已确认，任务继续执行':'❌ 已取消操作')}/>
                  <div className="msg-time">{new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              </div>
            );
            return null;
          })}
          {loading&&(
            <div className="msg">
              <div className="msg-avatar bot">🦞</div>
              <div className="msg-content">
                <div className="msg-name">小助手</div>
                <div className="msg-bubble bot"><div className="typing"><span/><span/><span/></div></div>
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>

        <div className="chat-foot">
          <div className="quick-pills">
            {quickPills.map(q=><button key={q.t} className="quick-pill" onClick={()=>send(q.t)}>{q.t}</button>)}
          </div>
          <div className="chat-input-row">
            <textarea className="chat-field" rows={1} placeholder={`发消息给小助手...`} value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(input);}}}/>
            <button className="chat-send" disabled={loading||!input.trim()} onClick={()=>send(input)}>➤</button>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
