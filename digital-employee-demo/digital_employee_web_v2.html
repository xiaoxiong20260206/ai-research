<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>数字员工平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ───────────────────────────────────────────
   DESIGN TOKENS
─────────────────────────────────────────── */
:root {
  /* Surfaces */
  --bg:        #F5F4F0;
  --surface:   #FFFFFF;
  --surface-2: #F9F8F5;
  --surface-3: #F1EFE9;

  /* Brand */
  --ink:       #1B2D4F;
  --ink-mid:   #3D5476;
  --ink-light: #7A92B4;

  /* Agent / Pet accent — amber */
  --amber:     #D97706;
  --amber-dim: #92400E;
  --amber-bg:  #FFFBEB;
  --amber-border: #FDE68A;

  /* Functional */
  --blue:      #2563EB;
  --blue-bg:   #EFF6FF;
  --blue-border:#BFDBFE;
  --green:     #059669;
  --green-bg:  #ECFDF5;
  --red:       #DC2626;
  --red-bg:    #FEF2F2;
  --orange:    #EA580C;
  --orange-bg: #FFF7ED;
  --purple:    #7C3AED;
  --purple-bg: #F5F3FF;
  --teal:      #0D9488;
  --teal-bg:   #F0FDFA;

  /* Borders */
  --border:    #E8E5DD;
  --border-2:  #D6D0C4;
  --border-focus: #2563EB;

  /* Text */
  --text:      #1C1917;
  --text-2:    #57534E;
  --text-3:    #A8A29E;
  --text-4:    #D6D3D1;

  /* Dimensions */
  --sidebar:   228px;
  --radius:    8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  /* Fonts */
  --f-display: 'Sora', 'PingFang SC', sans-serif;
  --f-body:    'Figtree', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(28,25,23,.05);
  --shadow:    0 1px 3px rgba(28,25,23,.07), 0 1px 2px rgba(28,25,23,.05);
  --shadow-md: 0 4px 6px rgba(28,25,23,.06), 0 2px 4px rgba(28,25,23,.05);
  --shadow-lg: 0 10px 15px rgba(28,25,23,.07), 0 4px 6px rgba(28,25,23,.05);
}

/* ───────────────────────────────────────────
   RESET & BASE
─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body {
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
button { cursor: pointer; font-family: var(--f-body); }
input, textarea { font-family: var(--f-body); }

/* ───────────────────────────────────────────
   LAYOUT
─────────────────────────────────────────── */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.brand-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.brand-logo {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.brand-name {
  font-family: var(--f-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.brand-org {
  font-size: 11px;
  color: var(--text-3);
  padding-left: 38px;
}

/* Agent status strip */
.agent-strip {
  margin: 10px 16px 0;
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: var(--radius);
  padding: 7px 10px;
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  transition: background .15s;
}
.agent-strip:hover { background: #FEF3C7; }
.agent-strip-icon { font-size: 16px; animation: bob 2.5s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
.agent-strip-info { flex: 1; min-width: 0; }
.agent-strip-name { font-size: 12px; font-weight: 600; color: var(--amber-dim); }
.agent-strip-status { font-size: 11px; color: var(--amber); display: flex; align-items: center; gap: 4px; }
.status-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse-green 2s infinite; }
@keyframes pulse-green { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

/* Nav */
.sidebar-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav-group { margin-bottom: 2px; }
.nav-group-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .07em;
  color: var(--text-3);
  text-transform: uppercase;
  padding: 8px 8px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 10px;
  border-radius: var(--radius);
  color: var(--text-2);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all .14s;
  position: relative;
  user-select: none;
}
.nav-item:hover { background: var(--surface-3); color: var(--text); }
.nav-item.active {
  background: var(--blue-bg);
  color: var(--blue);
  font-weight: 600;
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 20px;
  min-width: 18px;
  text-align: center;
}
.nav-count {
  font-size: 11px;
  color: var(--text-3);
  background: var(--surface-3);
  border-radius: 10px;
  padding: 1px 6px;
}

/* Sidebar footer */
.sidebar-foot {
  padding: 12px 12px 14px;
  border-top: 1px solid var(--border);
}
.xp-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 11px;
  cursor: pointer;
  transition: border-color .15s;
}
.xp-card:hover { border-color: var(--border-2); }
.xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.xp-level { font-size: 12px; font-weight: 600; color: var(--amber); }
.xp-val { font-size: 10.5px; color: var(--text-3); }
.xp-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--amber), #F59E0B); border-radius: 2px; transition: width .8s ease; }

/* Main area */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 14px;
  flex-shrink: 0;
}
.topbar-title { font-family: var(--f-display); font-size: 16px; font-weight: 700; color: var(--ink); }
.topbar-sub { font-size: 12px; color: var(--text-3); margin-left: 2px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.page-body { flex: 1; overflow-y: auto; padding: 22px 24px; }

/* ───────────────────────────────────────────
   SHARED COMPONENTS
─────────────────────────────────────────── */
/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; border: none;
  transition: all .14s; white-space: nowrap;
  font-family: var(--f-body);
}
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--ink-mid); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: #1D4ED8; }
.btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border-2); }
.btn-outline:hover { background: var(--surface-2); border-color: var(--text-3); }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid transparent; }
.btn-ghost:hover { background: var(--surface-3); color: var(--text); }
.btn-amber { background: var(--amber); color: #fff; }
.btn-amber:hover { background: var(--amber-dim); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
.btn-danger:hover { background: #FEE2E2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-lg { padding: 10px 20px; font-size: 14px; }
.btn-icon { padding: 7px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.card-sm { padding: 12px 14px; }
.card-title {
  font-family: var(--f-display);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 14px;
}

/* Stat cards */
.stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.stat-val { font-family: var(--f-display); font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
.stat-label { font-size: 12px; color: var(--text-2); }
.stat-delta { font-size: 11px; margin-top: 3px; }
.stat-icon { float: right; font-size: 20px; opacity: .2; margin-top: 2px; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-orange { background: var(--orange-bg); color: var(--orange); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-gray { background: var(--surface-3); color: var(--text-2); }
.badge-ink { background: var(--ink); color: #fff; }

/* Tags */
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; background: var(--surface-3); color: var(--text-2); border: 1px solid var(--border); }

/* Progress */
.progress { height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.progress-blue { background: var(--blue); }
.progress-amber { background: var(--amber); }
.progress-green { background: var(--green); }
.progress-ink { background: var(--ink); }

/* Status dot */
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-running { background: var(--blue); animation: blink-blue 1.8s infinite; }
.dot-hil { background: var(--orange); animation: blink-orange 1.8s infinite; }
.dot-done { background: var(--green); }
.dot-amber { background: var(--amber); }
.dot-failed { background: var(--red); }
.dot-idle { background: var(--text-4); }
@keyframes blink-blue { 0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.35)} 50%{box-shadow:0 0 0 4px rgba(37,99,235,0)} }
@keyframes blink-orange { 0%,100%{box-shadow:0 0 0 0 rgba(234,88,12,.35)} 50%{box-shadow:0 0 0 4px rgba(234,88,12,0)} }
@keyframes fadein { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* Input / Textarea */
.field {
  width: 100%; padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13.5px; font-family: var(--f-body);
  outline: none; transition: border-color .15s;
}
.field:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.field::placeholder { color: var(--text-3); }
textarea.field { resize: none; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-label {
  font-size: 11.5px; font-weight: 600; letter-spacing: .06em;
  color: var(--text-3); text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* Spinner */
.spin { width:16px;height:16px;border:2px solid var(--border-2);border-top-color:var(--blue);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Typing dots */
.typing { display:flex;gap:3px;align-items:center;padding:4px 0; }
.typing span { width:5px;height:5px;background:var(--text-3);border-radius:50%;animation:typ 1.1s infinite; }
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes typ { 0%,80%,100%{transform:scale(.8);opacity:.4} 40%{transform:scale(1.2);opacity:1} }

/* Drawer */
.drawer-overlay { position:fixed;inset:0;background:rgba(28,25,23,.25);z-index:200;animation:fadein .2s ease; }
.drawer {
  position:fixed;top:0;right:0;bottom:0;width:500px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:201;overflow-y:auto;
  animation:slidein .22s ease;box-shadow:var(--shadow-lg);
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-head {
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.drawer-close { background:none;border:none;color:var(--text-3);font-size:20px;padding:2px;line-height:1;transition:color .15s; }
.drawer-close:hover { color:var(--text); }
.drawer-body { padding:18px 20px; }

/* Page enter animation */
.page-in { animation:pagein .18s ease; }
@keyframes pagein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* HIL card */
.hil-card {
  background: var(--orange-bg);
  border: 1px solid #FED7AA;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
}
.hil-title { font-weight: 600; color: var(--orange); font-size: 13px; margin-bottom: 6px; display:flex;align-items:center;gap:6px; }
.hil-body { font-size: 13px; color: var(--text-2); margin-bottom: 10px; line-height:1.6; }
.diff-block {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px; padding:8px 12px;
  font-family: 'Courier New', monospace;
  font-size: 12px; margin-bottom: 10px; overflow-x: auto;
}
.diff-add { color: var(--green); }
.diff-rm { color: var(--red); }
.hil-actions { display:flex;gap:7px; }

/* Task card */
.task-item {
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  cursor:pointer;
  transition:all .14s;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.task-item::before { content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px; }
.task-item.running::before { background:var(--blue); }
.task-item.hil::before { background:var(--orange); }
.task-item.done::before { background:var(--green); }
.task-item.failed::before { background:var(--red); }
.task-item:hover { border-color:var(--border-2);box-shadow:var(--shadow-md);transform:translateY(-1px); }
.task-name { font-weight:500;font-size:13.5px;margin-bottom:3px; }
.task-meta { font-size:11.5px;color:var(--text-3);display:flex;gap:8px;align-items:center; }

/* Chat */
.chat-wrap { display:flex;flex-direction:column;height:100%; }
.chat-messages { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:18px 20px; }
.msg { display:flex;gap:9px;animation:msgIn .18s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar { width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--surface-3);border:1px solid var(--border); }
.msg-avatar.ai { background:var(--amber-bg);border-color:var(--amber-border); }
.msg-bubble {
  max-width:72%;padding:10px 14px;border-radius:12px;
  font-size:13.5px;line-height:1.65;
}
.msg-bubble.ai { background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px; }
.msg-bubble.user { background:var(--ink);color:#fff;border-top-right-radius:4px; }
.msg-bubble strong { font-weight:600; }
.msg-bubble code { background:var(--surface-3);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:var(--blue); }
.msg-bubble.user code { background:rgba(255,255,255,.15);color:#fff; }
.msg-bubble pre { background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-top:7px;font-size:12px;overflow-x:auto;white-space:pre-wrap;font-family:monospace; }
.chat-foot { padding:12px 16px;border-top:1px solid var(--border);background:var(--surface); }
.chat-input-row { display:flex;gap:8px;align-items:flex-end; }
.chat-input-row textarea { flex:1;min-height:38px;max-height:110px; }
.chat-send { width:36px;height:36px;border-radius:var(--radius);background:var(--ink);color:#fff;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .14s;flex-shrink:0; }
.chat-send:hover { background:var(--ink-mid); }
.chat-send:disabled { opacity:.4;cursor:not-allowed; }
.quick-pills { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px; }
.quick-pill { padding:4px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-2);cursor:pointer;transition:all .13s; }
.quick-pill:hover { background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue); }

/* Skills grid */
.skills-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:12px; }
.skill-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 16px;
  cursor:pointer;transition:all .15s;
  box-shadow:var(--shadow-sm);
}
.skill-card:hover { border-color:var(--border-2);box-shadow:var(--shadow-md);transform:translateY(-2px); }
.skill-card.owned { border-color:#BFDBFE; }

/* Agent core grid */
.core-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px; }
.core-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;
  cursor:pointer;transition:all .15s;
}
.core-card:hover { border-color:var(--border-2);box-shadow:var(--shadow-md); }
.core-card.active { border-color:var(--blue-border);background:var(--blue-bg); }

/* Memory list */
.mem-item { display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border); }
.mem-item:last-child { border-bottom:none; }

/* Project space pipeline */
.pipeline { display:flex;gap:0;overflow-x:auto;padding-bottom:4px; }
.pipeline-stage {
  min-width:200px;flex:1;
  border-right:1px solid var(--border);
  padding:0 14px 14px;
}
.pipeline-stage:last-child { border-right:none; }
.stage-header {
  padding:12px 0 10px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.stage-name { font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.06em; }
.stage-count { font-size:11px;color:var(--text-3);background:var(--surface-3);border-radius:10px;padding:1px 7px; }
.stage-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;
  margin-bottom:8px;box-shadow:var(--shadow-sm);
  transition:all .14s;cursor:pointer;
}

}

async function callClaude(msgs, sys, key, onChunk) {
  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:sys,messages:msgs,stream:true})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const reader=r.body.getReader(),dec=new TextDecoder();
  let full='';
  while(true){
    const{done,value}=await reader.read();if(done)break;
    for(const line of dec.decode(value).split('\n')){
      if(line.startsWith('data: ')){try{const d=JSON.parse(line.slice(6));if(d.delta?.text){full+=d.delta.text;onChunk(full);}}catch{}}
    }
  }
  return full;
}

function RadarChart({data,size=220}){
  const cx=size/2, cy=size/2, r=size/2-30;
  const n=data.length;
  const angle=i=>(Math.PI*2*i/n)-Math.PI/2;
  const px=(i,pct)=>cx+r*(pct/100)*Math.cos(angle(i));
  const py=(i,pct)=>cy+r*(pct/100)*Math.sin(angle(i));

  const gridLevels=[20,40,60,80,100];
  const pts=data.map((_,i)=>`${px(i,data[i].score)},${py(i,data[i].score)}`).join(' ');

  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {/* Grid */}
      {gridLevels.map(lv=>(
        <polygon key={lv} points={data.map((_,i)=>`${px(i,lv)},${py(i,lv)}`).join(' ')}
          fill="none" stroke="var(--border)" strokeWidth={lv===100?1.2:.6} strokeDasharray={lv<100?'3,3':'none'}/>
      ))}
      {/* Axes */}
      {data.map((_,i)=>(
        <line key={i} x1={cx} y1={cy} x2={px(i,100)} y2={py(i,100)} stroke="var(--border)" strokeWidth=".6"/>
      ))}
      {/* Data area */}
      <polygon points={pts} fill="rgba(37,99,235,.12)" stroke="var(--blue)" strokeWidth="2"/>
      {/* Data points */}
      {data.map((d,i)=>(
        <circle key={i} cx={px(i,d.score)} cy={py(i,d.score)} r="4" fill="var(--blue)" stroke="#fff" strokeWidth="2"/>
      ))}
      {/* Labels */}
      {data.map((d,i)=>{
        const lx=px(i,118), ly=py(i,118);
        return <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
          style={{fontSize:10,fill:'var(--text-2)',fontFamily:'var(--f-body)'}}>{d.icon} {d.name}</text>;
      })}
    </svg>
  );
}

function TasksPage({apiKey,currentRole}){
  const [filter,setFilter]=useState('all');
  const [selected,setSelected]=useState(null);
  const [code,setCode]=useState('');
  const [reviewing,setReviewing]=useState(false);
  const [reviewResult,setReviewResult]=useState('');

  const taskRole=ROLE_TO_TASK_ROLE[currentRole||'dev'];
  const roleTasks=TASKS.filter(t=>t.role===taskRole);
  const filtered=filter==='all'?roleTasks:roleTasks.filter(t=>t.status===filter);
  const tool=ROLE_TOOL[currentRole||'dev'];

  async function runReview(){
    if(!code.trim())return;
    setReviewing(true);setReviewResult('');
    const sys=`你是代码审查专家。对提交的代码进行专业审查，重点关注：安全漏洞/性能问题/代码规范/逻辑错误。以结构化 Markdown 格式输出，分🔴必须修复、🟡建议修复、🟢亮点。`;
    if(!apiKey){
      await new Promise(r=>setTimeout(r,1000));
      setReviewResult(mockReply('review'));setReviewing(false);return;
    }
    try{
      let r='';
      await callClaude([{role:'user',content:`请审查：\n\`\`\`\n${code}\n\`\`\``}],sys,apiKey,p=>{r=p;setReviewResult(p);});
    }catch(e){setReviewResult(`❌ ${e.message}`);}
    setReviewing(false);
  }

  return(
    <div className="page-in" style={{display:'grid',gridTemplateColumns:'1fr 380px',gap:18}}>
      <div>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {['all','running','hil','done'].map(f=>(
            <button key={f} className={`btn btn-sm ${filter===f?'btn-blue':'btn-outline'}`} onClick={()=>setFilter(f)}>
              {f==='all'?'全部':f==='running'?'⚡ 运行中':f==='hil'?'⏸ 待审批':'✅ 已完成'}
            </button>
          ))}
          <div style={{marginLeft:'auto',fontSize:12,color:'var(--text-3)',alignSelf:'center'}}>{filtered.length} 个任务</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {filtered.map(t=>(
            <div key={t.id} className={`task-item ${t.status}`} onClick={()=>setSelected(t)}>
              <Dot s={t.status}/>
              <div style={{flex:1,minWidth:0}}>
                <div className="task-name">{t.name}</div>
                <div className="task-meta">
                  <span>{t.time}</span><span>·</span>
                  <span>{t.trigger}</span><span>·</span>
                  <span>{t.clones} 个分身</span>
                  {t.jira&&<><span>·</span><span style={{color:'var(--blue)'}}>{t.jira}</span></>}
                </div>
                {t.status!=='done'&&<div style={{marginTop:7}}><ProgressBar pct={t.progress} cls={t.status==='hil'?'progress-amber':'progress-blue'}/></div>}
              </div>
              <div style={{flexShrink:0,textAlign:'right'}}>
                {t.status==='done'
                  ?<span style={{fontSize:12,color:'var(--green)',fontWeight:600}}>省 {t.saved}min</span>
                  :<span style={{fontSize:12,color:'var(--text-3)'}}>{t.progress}%</span>}
              </div>
            </div>
          ))}
          {filtered.length===0&&<div className="empty"><div className="empty-icon">📋</div><div className="empty-text">暂无{filter==='running'?'运行中':filter==='hil'?'待审批':'已完成'}的任务</div></div>}
        </div>
      </div>

      <div>
        <div className="card">
          <div className="card-title">{tool.title}</div>
          <textarea className="field" rows={9} style={{marginBottom:10}} value={code}
            placeholder={tool.placeholder} onChange={e=>setCode(e.target.value)}/>
          <button className="btn btn-primary" style={{width:'100%'}} disabled={reviewing||!code.trim()} onClick={runReview}>
            {reviewing?<><Spinner/>分析中...</>:tool.btnLabel}
          </button>
          {reviewResult&&(
            <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--border)',fontSize:13,lineHeight:1.7}}
              dangerouslySetInnerHTML={{__html:reviewResult
                .replace(/🔴/g,'<span style="color:var(--red)">🔴</span>')
                .replace(/🟡/g,'<span style="color:var(--amber)">🟡</span>')
                .replace(/🟢/g,'<span style="color:var(--green)">🟢</span>')
                .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                .replace(/`([^`]+)`/g,'<code style="background:var(--surface-3);padding:1px 4px;border-radius:3px;font-size:11.5px;color:var(--blue)">$1</code>')
                .replace(/\n/g,'<br/>')}}/>
          )}
        </div>
      </div>

      {selected&&<TaskDrawer task={selected} onClose={()=>setSelected(null)}/>}
    </div>
  );
}
/* ───────────────────────────────
   PAGE: 项目空间 (增强版 — 含 Workflow 模板)

   1. Workflow 本身就是一种 Skill（Workflow Skill），可在 Skills 市场复用

function NotifPage({currentRole}){
  const taskRole=ROLE_TO_TASK_ROLE[currentRole||'dev'];
  const [items,setItems]=useState(NOTIFS.filter(n=>n.role===taskRole));
  const [filterType,setFilterType]=useState('all');
  const filtered=filterType==='all'?items:items.filter(n=>n.type===filterType);

  // Re-filter when role changes
  useEffect(()=>{
    setItems(NOTIFS.filter(n=>n.role===taskRole));
    setFilterType('all');
  },[taskRole]);

  return(
    <div className="page-in">
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        {['all','hil','done','alert','suggest'].map(f=>(
          <button key={f} className={`btn btn-sm ${filterType===f?'btn-blue':'btn-outline'}`} onClick={()=>setFilterType(f)}>

          </button>

        <div style={{marginLeft:'auto'}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setItems(p=>p.map(n=>({...n,unread:false})))}>全部已读</button>

      <div className="col-2">

        <div className="card" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:30}}>
          <div>
            <RadarChart data={ABILITIES} size={240}/>
          </div>
          <div style={{flex:1,maxWidth:250}}>
            <div style={{fontFamily:'var(--f-display)',fontWeight:700,fontSize:14,color:'var(--ink)',marginBottom:12}}>AgentCore 能力概览</div>
            {ABILITIES.map(a=>(
              <div key={a.name} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,cursor:'pointer'}}
                onClick={()=>setActiveAbility(activeAbility?.name===a.name?null:a)}>
                <span style={{fontSize:16,width:22,textAlign:'center'}}>{a.icon}</span>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:12,fontWeight:500}}>{a.name}</span>
                    <span style={{fontSize:12,fontWeight:700,color:a.color}}>{a.score}</span>
                  </div>
                  <ProgressBar pct={a.score} cls={`progress-${a.color==='var(--blue)'?'blue':a.color==='var(--green)'?'green':'amber'}`}/>
                </div>
              </div>
            ))}
            {activeAbility&&(
              <div style={{marginTop:10,padding:'10px 12px',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:12,color:'var(--text-2)',lineHeight:1.55,animation:'pagein .15s ease'}}>
                <strong style={{color:activeAbility.color}}>{activeAbility.name}</strong>（{activeAbility.sub}）<br/>{activeAbility.tip}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ─── Tab Bar ─── */}
      <div style={{display:'flex',gap:10,marginBottom:18,alignItems:'center'}}>
        <div className="tabs">
          {[{id:'overview',label:'📊 总览'},{id:'skill-tree',label:'🌳 能力体系'},{id:'growth',label:'📈 成长记录'}].map(t=>(
            <div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>
          ))}
        </div>
      </div>

      {/* ═══ Tab: 总览 ═══ */}
      {tab==='overview'&&(
        <div className="col-2">
          {/* Left: Teach + Memories */}
          <div>
            <div className="card" style={{marginBottom:14}}>
              <div className="card-title">💬 教 TA 新知识</div>
              {taught?(
                <div style={{textAlign:'center',padding:'14px 0',color:'var(--green)',fontSize:13}}>
                  ✅ 已学习！+8 XP 经验值已获得
                </div>
              ):(
                <>
                  <textarea className="field" rows={3} value={teachInput}
                    placeholder={`告诉数字员工需要记住的业务规则或工作习惯...`}
                    onChange={e=>setTeachInput(e.target.value)} style={{marginBottom:8}}/>
                  <div style={{display:'flex',gap:6,marginBottom:8}}>
                    {['偏好','教训','知识','经验'].map(t=>(
                      <span key={t} className="tag" style={{cursor:'pointer',fontSize:11}} onClick={()=>setTeachInput(`[${t}] `+teachInput)}>{t}</span>
                    ))}
                  </div>
                  <button className="btn btn-amber" style={{width:'100%'}} disabled={!teachInput.trim()}
                    onClick={()=>{
                      const type=teachInput.startsWith('[')?(teachInput.match(/\[(.+?)\]/)?.[1]||'知识'):'知识';
                      const text=teachInput.replace(/^\[.+?\]\s*/,'');
                      setMems(p=>[{type,icon:type==='偏好'?'📌':type==='教训'?'🔴':type==='知识'?'🧠':'💡',text,time:'刚刚',color:'var(--blue)'},...p]);
                      setTaught(true);setTeachInput('');
                      setTimeout(()=>setTaught(false),2500);
                    }}>
                    ➕ 教数字员工记住这个
                  </button>
                </>
              )}
            </div>

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div className="section-label" style={{marginBottom:0}}>记忆日志</div>
              <span style={{fontSize:12,color:'var(--text-3)'}}>共 {mems.length} 条</span>
            </div>
            <div className="card" style={{padding:'0 14px',maxHeight:300,overflowY:'auto'}}>
              {mems.map((m,i)=>(
                <div key={i} className="mem-item">
                  <div style={{fontSize:14,width:18,textAlign:'center',flexShrink:0,marginTop:1}}>{m.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,lineHeight:1.5}}>{m.text}</div>
                    <div style={{fontSize:11,color:'var(--text-3)',marginTop:2,display:'flex',gap:6,alignItems:'center'}}>
                      <Badge t="gray">{m.type}</Badge>{m.time}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Right: Achievements */}
          <div>
            <div className="section-label">成就系统</div>
            <div className="achv-grid">
              {ACHIEVEMENTS.map(a=>{
                const rCls=a.rarity==='common'?'':a.rarity==='rare'?'rare':a.rarity==='epic'?'epic':'legend';
                const rColor={common:'var(--text-3)',rare:'var(--blue)',epic:'var(--purple)',legend:'var(--amber)'}[a.rarity];
                return(
                  <div key={a.id} className={`achv-card ${rCls} ${!a.unlocked?'locked':''}`} title={a.desc}>
                    <div className="achv-icon">{a.unlocked?a.icon:'🔒'}</div>
                    <div className="achv-name">{a.name}</div>
                    <div className="achv-rarity" style={{color:rColor}}>{a.rarity==='common'?'普通':a.rarity==='rare'?'稀有':a.rarity==='epic'?'史诗':'传说'}</div>
                    {a.unlocked&&<div style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{a.unlocked}</div>}
                  </div>
                );
              })}
            </div>

            <div className="section-label" style={{marginTop:18}}>成长历程</div>
            <div style={{display:'flex',gap:0,paddingLeft:8}}>
              {[['🥚 幼苗','已解锁'],['🌿 学徒','已解锁'],['⚡ 助手','已解锁'],['🤝 伙伴','当前'],['🌟 数字员工','待解锁']].map(([l,s],i)=>(
                <div key={i} style={{flex:1,textAlign:'center',position:'relative'}}>
                  {i<4&&<div style={{position:'absolute',top:11,left:'50%',right:'-50%',height:2,background:i<3?'var(--green)':i===3?'linear-gradient(90deg,var(--green),var(--border))':'var(--border)',zIndex:0}}/>}
                  <div style={{width:22,height:22,borderRadius:'50%',background:s==='当前'?'var(--amber)':s==='已解锁'?'var(--green)':'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,margin:'0 auto 4px',position:'relative',zIndex:1,border:'2px solid var(--surface)',color:'#fff'}}>
                    {s==='已解锁'||s==='当前'?'✓':''}
                  </div>
                  <div style={{fontSize:10,color:s==='当前'?'var(--amber)':s==='已解锁'?'var(--green)':'var(--text-3)',fontWeight:s==='当前'?700:400,lineHeight:1.3}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ═══ Tab: 能力体系（三层技能树） ═══ */}
      {tab==='skill-tree'&&(
        <div>
          {/* Meta layer */}
          <div className="skill-tree-layer layer-meta">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <span style={{fontSize:18}}>{SKILL_TREE.meta.label.split(' ')[0]}</span>
              <div>
                <div style={{fontFamily:'var(--f-display)',fontWeight:700,fontSize:14,color:'var(--purple)'}}>{SKILL_TREE.meta.label.split(' ').slice(1).join(' ')}</div>
                <div style={{fontSize:12,color:'var(--text-2)'}}>{SKILL_TREE.meta.desc}</div>
              </div>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {SKILL_TREE.meta.skills.map(sk=>(
                <div key={sk.name} className="skill-node" title={sk.desc}>
                  <span style={{fontSize:13}}>{sk.icon}</span>
                  <span>{sk.name}</span>
                  <span className={`skill-lv lv-${sk.lv}`}>L{sk.lv}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="layer-connector">↓ 赋能 ↓</div>

          {/* Domain layer */}
          <div className="skill-tree-layer layer-domain">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <span style={{fontSize:18}}>{SKILL_TREE.domain.label.split(' ')[0]}</span>
              <div>
                <div style={{fontFamily:'var(--f-display)',fontWeight:700,fontSize:14,color:'var(--blue)'}}>{SKILL_TREE.domain.label.split(' ').slice(1).join(' ')}</div>
                <div style={{fontSize:12,color:'var(--text-2)'}}>{SKILL_TREE.domain.desc}</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
              {SKILL_TREE.domain.groups.map(g=>(
                <div key={g.name} style={{background:'rgba(255,255,255,.6)',border:'1px solid var(--blue-border)',borderRadius:'var(--radius)',padding:'10px 12px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:8}}>
                    <span style={{fontSize:14}}>{g.icon}</span>
                    <span style={{fontWeight:600,fontSize:13}}>{g.name}</span>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {g.skills.map(sk=>(
                      <div key={sk.name} className="skill-node" style={{fontSize:11.5}}>
                        <span>{sk.name}</span>
                        <span className={`skill-lv lv-${sk.lv}`}>L{sk.lv}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="layer-connector">↓ 调用 ↓</div>

          {/* Execution layer */}
          <div className="skill-tree-layer layer-exec">
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <span style={{fontSize:18}}>{SKILL_TREE.exec.label.split(' ')[0]}</span>
              <div>
                <div style={{fontFamily:'var(--f-display)',fontWeight:700,fontSize:14,color:'var(--teal)'}}>{SKILL_TREE.exec.label.split(' ').slice(1).join(' ')}</div>
                <div style={{fontSize:12,color:'var(--text-2)'}}>{SKILL_TREE.exec.desc}</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {SKILL_TREE.exec.groups.map(g=>(
                <div key={g.name} style={{background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'10px 12px'}}>
                  <div style={{fontWeight:600,fontSize:12,color:'var(--text-2)',marginBottom:7}}>{g.name}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {g.skills.map(sName=>{
                      const sk=SKILLS.find(s=>s.name===sName);
                      return sk?(
                        <div key={sName} style={{display:'flex',alignItems:'center',gap:6,fontSize:12}}>
                          <span style={{fontSize:14}}>{sk.icon}</span>
                          <span style={{flex:1}}>{sk.name}</span>
                          {sk.mine&&<Badge t="blue" style={{fontSize:9}}>✓</Badge>}
                          <span style={{fontSize:10.5,color:'var(--text-3)'}}>{sk.evals}分</span>
                        </div>
                      ):<div key={sName} style={{fontSize:12,color:'var(--text-3)'}}>{sName}</div>;
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Stats summary */}
          <div style={{marginTop:18,display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}}>
            {[
              {label:'元能力',val:'6',sub:'平均 L3.8',color:'var(--purple)'},
              {label:'领域能力',val:'4',sub:'覆盖 4 领域',color:'var(--blue)'},
              {label:'执行技能',val:'12',sub:'平均 Evals 87',color:'var(--teal)'},
              {label:'Workflow',val:'10',sub:'5 个角色模板',color:'var(--green)'},
              {label:'综合评分',val:'82',sub:'高于团队平均',color:'var(--amber)'},
            ].map(s=>(
              <div key={s.label} className="card" style={{textAlign:'center',padding:'14px 10px'}}>
                <div style={{fontFamily:'var(--f-display)',fontWeight:800,fontSize:24,color:s.color}}>{s.val}</div>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text-2)',marginBottom:2}}>{s.label}</div>
                <div style={{fontSize:10.5,color:'var(--text-3)'}}>{s.sub}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ═══ Tab: 成长记录（进化时间线） ═══ */}
      {tab==='growth'&&(
        <div className="col-2">
          <div>
            <div className="section-label">进化时间线</div>
            <div className="card">
              <div className="evo-timeline">
                {EVOLUTION.map((ev,i)=>{
                  const isCurrent=ev.time==='当前';
                  const isFuture=ev.time==='未来'||ev.time==='愿景';
                  return(
                    <div key={ev.ver} className="evo-item">
                      <div className={`evo-dot ${isCurrent?'current':isFuture?'future':'past'}`}/>
                      <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
                        <div style={{fontSize:22,width:32,textAlign:'center',flexShrink:0}}>{ev.icon}</div>
                        <div style={{flex:1}}>
                          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                            <span style={{fontWeight:700,fontSize:14,color:isCurrent?'var(--amber)':isFuture?'var(--text-3)':'var(--ink)'}}>{ev.ver}</span>
                            <Badge t={isCurrent?'amber':isFuture?'gray':'green'}>{ev.phase}</Badge>
                            <span style={{fontSize:11,color:'var(--text-3)'}}>{ev.time}</span>
                          </div>
                          <div style={{fontSize:13,color:isFuture?'var(--text-3)':'var(--text-2)',lineHeight:1.6,marginBottom:5}}>{ev.desc}</div>
                          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                            {ev.tags.map(t=><span key={t} className="tag" style={{fontSize:10}}>{t}</span>)}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div>
            <div className="section-label">成就墙</div>
            <div className="achv-grid" style={{gridTemplateColumns:'repeat(2,1fr)'}}>
              {ACHIEVEMENTS.filter(a=>a.unlocked).map(a=>{
                const rColor={common:'var(--text-3)',rare:'var(--blue)',epic:'var(--purple)',legend:'var(--amber)'}[a.rarity];
                return(
                  <div key={a.id} className={`achv-card ${a.rarity!=='common'?a.rarity:''}`}>
                    <div className="achv-icon">{a.icon}</div>
                    <div className="achv-name">{a.name}</div>
                    <div className="achv-rarity" style={{color:rColor}}>{a.rarity==='common'?'普通':a.rarity==='rare'?'稀有':a.rarity==='epic'?'史诗':'传说'}</div>
                    <div style={{fontSize:10.5,color:'var(--text-2)',marginTop:3,lineHeight:1.4}}>{a.desc}</div>
                    <div style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>解锁于 {a.unlocked}</div>
                  </div>
                );
              })}
            </div>

            <div className="section-label" style={{marginTop:18}}>周增长趋势</div>
            <div className="card">
              {[
                {label:'任务完成',val:'+12',pct:67,color:'var(--blue)'},
                {label:'新增记忆',val:'+6',pct:40,color:'var(--teal)'},
                {label:'Evals 平均',val:'85.2',pct:85,color:'var(--green)'},
                {label:'节省工时',val:'+3.2h',pct:56,color:'var(--amber)'},
              ].map(w=>(
                <div key={w.label} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                    <span style={{color:'var(--text-2)'}}>{w.label}</span>
                    <span style={{fontWeight:700,color:w.color}}>{w.val}</span>
                  </div>
                  <ProgressBar pct={w.pct} cls={`progress-${w.color==='var(--blue)'?'blue':w.color==='var(--green)'?'green':'amber'}`}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
/* ───────────────────────────────
   PAGE: 管理者视图 (原"团队视图"改造)
   
   核心变更：
   1. 改名为"管理者视图"——只有 Leader 权限才能查看
   2. 增加隐私边界提示
   3. 增加 AI 使用率、提效数据、效率排行榜
   4. 普通成员看到的是权限不足页面
─────────────────────────────── */
function ManagerPage({isLeader}){
  const [dept,setDept]=useState('all');
  const [dim,setDim]=useState('tasks');
  const depts=['all','研效线','职能线','业务线'];
  const filtered=dept==='all'?TEAM:TEAM.filter(m=>m.dept===dept);
  const lvLabel=l=>['','🥚 幼苗','🌿 学徒','⚡ 助手','🤝 伙伴','🌟 数字员工'][l];

  // Non-leader gate
  if(!isLeader){
    return(
      <div className="page-in">
        <div className="manager-gate">
          <div style={{fontSize:48,marginBottom:16,opacity:.4}}>🔒</div>
          <div style={{fontFamily:'var(--f-display)',fontSize:18,fontWeight:700,color:'var(--ink)',marginBottom:8}}>需要管理者权限</div>
          <div style={{fontSize:13.5,color:'var(--text-2)',lineHeight:1.7,maxWidth:400,margin:'0 auto'}}>
            管理者视图仅对拥有 <strong>Leader 权限</strong> 的用户开放。<br/>
            该页面包含团队成员的 AI 使用数据和效率排行，出于隐私保护仅限管理者查看。
          </div>
          <div style={{marginTop:20}}>
            <button className="btn btn-outline">了解权限说明</button>
          </div>
        </div>
      </div>
    );
  }

  // Sort by dim
  const sortKey={tasks:'weekTasks',usage:'aiUsageRate',time:'timeSaved'}[dim]||'weekTasks';
  const sorted=[...filtered].sort((a,b)=>b[sortKey]-a[sortKey]);

  const teamStats={
    members:TEAM.length,
    totalTasks:TEAM.reduce((s,m)=>s+m.weekTasks,0),
    avgUsage:Math.round(TEAM.reduce((s,m)=>s+m.aiUsageRate,0)/TEAM.length),
    totalSaved:TEAM.reduce((s,m)=>s+m.timeSaved,0).toFixed(1),
  };

  return(
    <div className="page-in">
      {/* Privacy notice */}
      <div className="privacy-note">
        <strong>🔐 数据隐私说明</strong> · 本页面数据仅对拥有 Leader 权限的管理者可见。
        展示的是团队成员的 AI 使用情况和提效数据，旨在帮助管理者了解 AI 辅助工具的团队采用度。
        <strong>个人对话内容、记忆详情不会展示</strong>，仅显示汇总统计。
      </div>

      {/* Team stats */}
      <div className="stat-grid" style={{marginBottom:20}}>
        <div className="stat-card"><div className="stat-icon">👥</div><div className="stat-val" style={{color:'var(--ink)'}}>{teamStats.members}</div><div className="stat-label">活跃成员</div></div>
        <div className="stat-card"><div className="stat-icon">📊</div><div className="stat-val" style={{color:'var(--blue)'}}>{teamStats.totalTasks}</div><div className="stat-label">本周团队任务</div><div className="stat-delta" style={{color:'var(--green)',fontSize:11}}>↑ 12 较上周</div></div>
        <div className="stat-card"><div className="stat-icon">🤖</div><div className="stat-val" style={{color:'var(--purple)'}}>{teamStats.avgUsage}%</div><div className="stat-label">AI 平均使用率</div><div className="stat-delta" style={{color:'var(--green)',fontSize:11}}>↑ 5% 较上月</div></div>
        <div className="stat-card"><div className="stat-icon">⏱</div><div className="stat-val" style={{color:'var(--green)'}}>{teamStats.totalSaved}h</div><div className="stat-label">本周团队节省工时</div><div className="stat-delta" style={{color:'var(--green)',fontSize:11}}>↑ 4.8h 较上周</div></div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:8,marginBottom:18,alignItems:'center'}}>
        <div style={{display:'flex',gap:6}}>
          {depts.map(d=>(
            <button key={d} className={`btn btn-sm ${dept===d?'btn-blue':'btn-outline'}`} onClick={()=>setDept(d)}>
              {d==='all'?'全部':d}
            </button>
          ))}
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          {[{id:'tasks',label:'按任务数'},{id:'usage',label:'按使用率'},{id:'time',label:'按节省工时'}].map(d=>(
            <button key={d.id} className={`btn btn-sm ${dim===d.id?'btn-primary':'btn-ghost'}`} onClick={()=>setDim(d.id)}>
              {d.label}
            </button>
          ))}
        </div>
      </div>

      {/* Member cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
        {filtered.map(m=>(
          <div key={m.name} className="member-card">
            <div style={{width:44,height:44,borderRadius:'50%',background:'var(--surface-3)',border:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,margin:'0 auto 8px'}}>{m.avatar}</div>
            <div style={{fontWeight:600,fontSize:13.5,marginBottom:1}}>{m.name}</div>
            <div style={{fontSize:11.5,color:'var(--text-3)',marginBottom:8}}>{m.role} · {m.dept}</div>
            <div style={{display:'flex',justifyContent:'center',marginBottom:10}}><Badge t="amber">{lvLabel(m.level)}</Badge></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,fontSize:10}}>
              <div style={{textAlign:'center',background:'var(--surface-2)',borderRadius:6,padding:'6px 2px'}}>
                <div style={{fontFamily:'var(--f-display)',fontWeight:800,fontSize:15,color:'var(--ink)'}}>{m.weekTasks}</div>
                <div style={{color:'var(--text-3)'}}>本周任务</div>
              </div>
              <div style={{textAlign:'center',background:'var(--surface-2)',borderRadius:6,padding:'6px 2px'}}>

              <span className="xp-val">3420 / 5000 XP</span>
            </div>
            <div className="xp-bar"><div className="xp-fill" style={{width:'68%'}}/></div>
          </div>
          {/* Leader toggle for demo */}
          <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Demo 控制台</div>
            <div style={{marginBottom:6}}>
              <select style={{width:'100%',padding:'5px 8px',fontSize:11.5,borderRadius:6,border:'1px solid var(--border-2)',background:'var(--surface)',color:'var(--text)',cursor:'pointer',fontFamily:'var(--f-body)'}}
                value={currentRole} onChange={e=>handleRoleChange(e.target.value)}>
                {ROLES.map(r=><option key={r.id} value={r.id}>{r.icon} {r.label}（{r.person}）</option>)}
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:11,color:'var(--text-3)'}}>Leader 权限</span>
              <div className="toggle-sw" style={{background:isLeader?'var(--blue)':'var(--border-2)'}}
                onClick={()=>setIsLeader(!isLeader)}>
                <div className="toggle-knob" style={{left:isLeader?18:2}}/>
              </div>
            </div>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="main">
        <div className="topbar">
          <div>
            <span className="topbar-title">{meta.title}</span>
            <span className="topbar-sub"> · {meta.sub}</span>
          </div>
          <div className="topbar-right">
            <div style={{display:'flex',alignItems:'center',gap:7,padding:'4px 10px',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:20,fontSize:12}}>
              <span>{roleObj.icon}</span>
              <span style={{fontWeight:600,color:'var(--ink)'}}>{roleObj.person}</span>
              <span style={{color:'var(--text-3)'}}>{roleObj.dept}</span>
            </div>
            {showKey?(
              <div className="api-banner">
                <span style={{fontSize:13}}>🔑</span>
                <input className="api-key-field" type="password" placeholder="sk-ant-..." value={apiKey}
                  onChange={e=>setApiKey(e.target.value)} autoFocus/>
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowKey(false)}>完成</button>
              </div>
            ):(
              <button className={`btn btn-sm ${apiKey?'btn-outline':''}`} onClick={()=>setShowKey(true)}
                style={{fontSize:12,gap:5}}>
                {apiKey
                  ?<><span style={{color:'var(--green)'}}>●</span>真实 AI 已启用</>
                  :<><span style={{color:'var(--amber)'}}>●</span>启用真实 AI</>}
              </button>
            )}
          </div>
        </div>

        <div className="page-body">
          {page==='home'&&<HomePage apiKey={apiKey} agentName={agentName} currentRole={currentRole}/>}
          {page==='tasks'&&<TasksPage apiKey={apiKey} currentRole={currentRole}/>}
          {page==='project'&&<ProjectPage currentRole={currentRole}/>}
          {page==='notifs'&&<NotifPage currentRole={currentRole}/>}
          {page==='skills'&&<SkillsPage currentRole={currentRole}/>}
          {page==='agent'&&<AgentPage agentName={agentName} setAgentName={setAgentName}/>}
          {page==='manager'&&<ManagerPage isLeader={isLeader}/>}
          {page==='settings'&&<SettingsPage apiKey={apiKey} setApiKey={setApiKey} agentName={agentName} setAgentName={setAgentName}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
