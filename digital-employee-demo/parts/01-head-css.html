<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>数字员工平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ───────────────────────────────────────────
   DESIGN TOKENS
─────────────────────────────────────────── */
:root {
  /* Surfaces */
  --bg:        #F5F4F0;
  --surface:   #FFFFFF;
  --surface-2: #F9F8F5;
  --surface-3: #F1EFE9;

  /* Brand */
  --ink:       #1B2D4F;
  --ink-mid:   #3D5476;
  --ink-light: #7A92B4;

  /* Agent / Pet accent — amber */
  --amber:     #D97706;
  --amber-dim: #92400E;
  --amber-bg:  #FFFBEB;
  --amber-border: #FDE68A;

  /* Functional */
  --blue:      #2563EB;
  --blue-bg:   #EFF6FF;
  --blue-border:#BFDBFE;
  --green:     #059669;
  --green-bg:  #ECFDF5;
  --red:       #DC2626;
  --red-bg:    #FEF2F2;
  --orange:    #EA580C;
  --orange-bg: #FFF7ED;
  --purple:    #7C3AED;
  --purple-bg: #F5F3FF;
  --teal:      #0D9488;
  --teal-bg:   #F0FDFA;

  /* Borders */
  --border:    #E8E5DD;
  --border-2:  #D6D0C4;
  --border-focus: #2563EB;

  /* Text */
  --text:      #1C1917;
  --text-2:    #57534E;
  --text-3:    #A8A29E;
  --text-4:    #D6D3D1;

  /* Dimensions */
  --sidebar:   228px;
  --radius:    8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  /* Fonts */
  --f-display: 'Sora', 'PingFang SC', sans-serif;
  --f-body:    'Figtree', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(28,25,23,.05);
  --shadow:    0 1px 3px rgba(28,25,23,.07), 0 1px 2px rgba(28,25,23,.05);
  --shadow-md: 0 4px 6px rgba(28,25,23,.06), 0 2px 4px rgba(28,25,23,.05);
  --shadow-lg: 0 10px 15px rgba(28,25,23,.07), 0 4px 6px rgba(28,25,23,.05);
}

/* ───────────────────────────────────────────
   RESET & BASE
─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body {
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
button { cursor: pointer; font-family: var(--f-body); }
input, textarea { font-family: var(--f-body); }

/* ───────────────────────────────────────────
   LAYOUT
─────────────────────────────────────────── */
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.brand-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}
.brand-logo {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.brand-name {
  font-family: var(--f-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.brand-org {
  font-size: 11px;
  color: var(--text-3);
  padding-left: 38px;
}

/* Agent status strip */
.agent-strip {
  margin: 10px 16px 0;
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: var(--radius);
  padding: 7px 10px;
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  transition: background .15s;
}
.agent-strip:hover { background: #FEF3C7; }
.agent-strip-icon { font-size: 16px; animation: bob 2.5s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
.agent-strip-info { flex: 1; min-width: 0; }
.agent-strip-name { font-size: 12px; font-weight: 600; color: var(--amber-dim); }
.agent-strip-status { font-size: 11px; color: var(--amber); display: flex; align-items: center; gap: 4px; }
.status-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse-green 2s infinite; }
@keyframes pulse-green { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

/* Nav */
.sidebar-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav-group { margin-bottom: 2px; }
.nav-group-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .07em;
  color: var(--text-3);
  text-transform: uppercase;
  padding: 8px 8px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 10px;
  border-radius: var(--radius);
  color: var(--text-2);
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all .14s;
  position: relative;
  user-select: none;
}
.nav-item:hover { background: var(--surface-3); color: var(--text); }
.nav-item.active {
  background: var(--blue-bg);
  color: var(--blue);
  font-weight: 600;
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 20px;
  min-width: 18px;
  text-align: center;
}
.nav-count {
  font-size: 11px;
  color: var(--text-3);
  background: var(--surface-3);
  border-radius: 10px;
  padding: 1px 6px;
}

/* Sidebar footer */
.sidebar-foot {
  padding: 12px 12px 14px;
  border-top: 1px solid var(--border);
}
.xp-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 11px;
  cursor: pointer;
  transition: border-color .15s;
}
.xp-card:hover { border-color: var(--border-2); }
.xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.xp-level { font-size: 12px; font-weight: 600; color: var(--amber); }
.xp-val { font-size: 10.5px; color: var(--text-3); }
.xp-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--amber), #F59E0B); border-radius: 2px; transition: width .8s ease; }

/* Main area */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
.topbar {
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 14px;
  flex-shrink: 0;
}
.topbar-title { font-family: var(--f-display); font-size: 16px; font-weight: 700; color: var(--ink); }
.topbar-sub { font-size: 12px; color: var(--text-3); margin-left: 2px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.page-body { flex: 1; overflow-y: auto; padding: 22px 24px; }

/* ───────────────────────────────────────────
   SHARED COMPONENTS
─────────────────────────────────────────── */
/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; border: none;
  transition: all .14s; white-space: nowrap;
  font-family: var(--f-body);
}
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--ink-mid); }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: #1D4ED8; }
.btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border-2); }
.btn-outline:hover { background: var(--surface-2); border-color: var(--text-3); }
.btn-ghost { background: transparent; color: var(--text-2); border: 1px solid transparent; }
.btn-ghost:hover { background: var(--surface-3); color: var(--text); }
.btn-amber { background: var(--amber); color: #fff; }
.btn-amber:hover { background: var(--amber-dim); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
.btn-danger:hover { background: #FEE2E2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-lg { padding: 10px 20px; font-size: 14px; }
.btn-icon { padding: 7px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.card-sm { padding: 12px 14px; }
.card-title {
  font-family: var(--f-display);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 14px;
}

/* Stat cards */
.stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.stat-val { font-family: var(--f-display); font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
.stat-label { font-size: 12px; color: var(--text-2); }
.stat-delta { font-size: 11px; margin-top: 3px; }
.stat-icon { float: right; font-size: 20px; opacity: .2; margin-top: 2px; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-orange { background: var(--orange-bg); color: var(--orange); }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-gray { background: var(--surface-3); color: var(--text-2); }
.badge-ink { background: var(--ink); color: #fff; }

/* Tags */
.tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; background: var(--surface-3); color: var(--text-2); border: 1px solid var(--border); }

/* Progress */
.progress { height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.progress-blue { background: var(--blue); }
.progress-amber { background: var(--amber); }
.progress-green { background: var(--green); }
.progress-ink { background: var(--ink); }

/* Status dot */
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-running { background: var(--blue); animation: blink-blue 1.8s infinite; }
.dot-hil { background: var(--orange); animation: blink-orange 1.8s infinite; }
.dot-done { background: var(--green); }
.dot-failed { background: var(--red); }
.dot-idle { background: var(--text-4); }
@keyframes blink-blue { 0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.35)} 50%{box-shadow:0 0 0 4px rgba(37,99,235,0)} }
@keyframes blink-orange { 0%,100%{box-shadow:0 0 0 0 rgba(234,88,12,.35)} 50%{box-shadow:0 0 0 4px rgba(234,88,12,0)} }

/* Input / Textarea */
.field {
  width: 100%; padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 13.5px; font-family: var(--f-body);
  outline: none; transition: border-color .15s;
}
.field:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.field::placeholder { color: var(--text-3); }
textarea.field { resize: none; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-label {
  font-size: 11.5px; font-weight: 600; letter-spacing: .06em;
  color: var(--text-3); text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* Spinner */
.spin { width:16px;height:16px;border:2px solid var(--border-2);border-top-color:var(--blue);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Typing dots */
.typing { display:flex;gap:3px;align-items:center;padding:4px 0; }
.typing span { width:5px;height:5px;background:var(--text-3);border-radius:50%;animation:typ 1.1s infinite; }
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes typ { 0%,80%,100%{transform:scale(.8);opacity:.4} 40%{transform:scale(1.2);opacity:1} }

/* Drawer */
.drawer-overlay { position:fixed;inset:0;background:rgba(28,25,23,.25);z-index:200;animation:fadein .2s ease; }
.drawer {
  position:fixed;top:0;right:0;bottom:0;width:500px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:201;overflow-y:auto;
  animation:slidein .22s ease;box-shadow:var(--shadow-lg);
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-head {
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.drawer-close { background:none;border:none;color:var(--text-3);font-size:20px;padding:2px;line-height:1;transition:color .15s; }
.drawer-close:hover { color:var(--text); }
.drawer-body { padding:18px 20px; }

/* Page enter animation */
.page-in { animation:pagein .18s ease; }
@keyframes pagein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* HIL card */
.hil-card {
  background: var(--orange-bg);
  border: 1px solid #FED7AA;
  border-radius: var(--radius-lg);
  padding: 14px 16px;
}
.hil-title { font-weight: 600; color: var(--orange); font-size: 13px; margin-bottom: 6px; display:flex;align-items:center;gap:6px; }
.hil-body { font-size: 13px; color: var(--text-2); margin-bottom: 10px; line-height:1.6; }
.diff-block {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px; padding:8px 12px;
  font-family: 'Courier New', monospace;
  font-size: 12px; margin-bottom: 10px; overflow-x: auto;
}
.diff-add { color: var(--green); }
.diff-rm { color: var(--red); }
.hil-actions { display:flex;gap:7px; }

/* Task card */
.task-item {
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  cursor:pointer;
  transition:all .14s;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.task-item::before { content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px; }
.task-item.running::before { background:var(--blue); }
.task-item.hil::before { background:var(--orange); }
.task-item.done::before { background:var(--green); }
.task-item.failed::before { background:var(--red); }
.task-item:hover { border-color:var(--border-2);box-shadow:var(--shadow-md);transform:translateY(-1px); }
.task-name { font-weight:500;font-size:13.5px;margin-bottom:3px; }
.task-meta { font-size:11.5px;color:var(--text-3);display:flex;gap:8px;align-items:center; }

/* Chat */
.chat-wrap { display:flex;flex-direction:column;height:100%; }
.chat-messages { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:18px 20px; }
.msg { display:flex;gap:9px;animation:msgIn .18s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar { width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--surface-3);border:1px solid var(--border); }
.msg-avatar.ai { background:var(--amber-bg);border-color:var(--amber-border); }
.msg-bubble {
  max-width:72%;padding:10px 14px;border-radius:12px;
  font-size:13.5px;line-height:1.65;
}
.msg-bubble.ai { background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px; }
.msg-bubble.user { background:var(--ink);color:#fff;border-top-right-radius:4px; }
.msg-bubble strong { font-weight:600; }
.msg-bubble code { background:var(--surface-3);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:var(--blue); }
.msg-bubble.user code { background:rgba(255,255,255,.15);color:#fff; }
.msg-bubble pre { background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px;margin-top:7px;font-size:12px;overflow-x:auto;white-space:pre-wrap;font-family:monospace; }
.chat-foot { padding:12px 16px;border-top:1px solid var(--border);background:var(--surface); }
.chat-input-row { display:flex;gap:8px;align-items:flex-end; }
.chat-input-row textarea { flex:1;min-height:38px;max-height:110px; }
.chat-send { width:36px;height:36px;border-radius:var(--radius);background:var(--ink);color:#fff;border:none;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .14s;flex-shrink:0; }
.chat-send:hover { background:var(--ink-mid); }
.chat-send:disabled { opacity:.4;cursor:not-allowed; }
.quick-pills { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px; }
.quick-pill { padding:4px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-2);cursor:pointer;transition:all .13s; }
.quick-pill:hover { background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue); }

/* Skills grid */
.skills-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:12px; }
.skill-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 16px;
  cursor:pointer;transition:all .15s;
  box-shadow:var(--shadow-sm);
}
.skill-card:hover { border-color:var(--border-2);box-shadow:var(--shadow-md);transform:translateY(-2px); }
.skill-card.owned { border-color:#BFDBFE; }

/* Agent core grid */
.core-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:10px; }
.core-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;
  cursor:pointer;transition:all .15s;
}
.core-card:hover { border-color:var(--border-2);box-shadow:var(--shadow-md); }
.core-card.active { border-color:var(--blue-border);background:var(--blue-bg); }

/* Memory list */
.mem-item { display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border); }
.mem-item:last-child { border-bottom:none; }

/* Project space pipeline */
.pipeline { display:flex;gap:0;overflow-x:auto;padding-bottom:4px; }
.pipeline-stage {
  min-width:200px;flex:1;
  border-right:1px solid var(--border);
  padding:0 14px 14px;
}
.pipeline-stage:last-child { border-right:none; }
.stage-header {
  padding:12px 0 10px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--bg);z-index:1;
}
.stage-name { font-size:12px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.06em; }
.stage-count { font-size:11px;color:var(--text-3);background:var(--surface-3);border-radius:10px;padding:1px 7px; }
.stage-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;
  margin-bottom:8px;box-shadow:var(--shadow-sm);
  transition:all .14s;cursor:pointer;
}
.stage-card:hover { border-color:var(--border-2);box-shadow:var(--shadow-md); }
