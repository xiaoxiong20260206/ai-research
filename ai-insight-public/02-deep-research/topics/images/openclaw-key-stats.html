<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1060px; height: 400px; overflow: hidden; background: #FFFFFF; }
.white-border { width: 1060px; height: 400px; padding: 20px; background: #FFFFFF; }
.outer {
    width: 1020px; height: 360px;
    background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    border-radius: 16px; padding: 28px 32px;
    display: flex; flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff;
}
.title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.subtitle { font-size: 13px; text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
.cards { display: flex; gap: 12px; flex: 1; }
.card {
    flex: 1; background: rgba(255,255,255,0.06); border-radius: 12px;
    padding: 16px; display: flex; flex-direction: column; align-items: center;
    border: 1px solid rgba(255,255,255,0.08);
}
.card-icon { font-size: 28px; margin-bottom: 8px; }
.card-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; letter-spacing: 1px; }
.card-value { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.card-desc { font-size: 12px; color: rgba(255,255,255,0.55); text-align: center; line-height: 1.5; }

.card:nth-child(1) .card-value { color: #ff7675; }
.card:nth-child(2) .card-value { color: #74b9ff; }
.card:nth-child(3) .card-value { color: #ffeaa7; }
.card:nth-child(4) .card-value { color: #55efc4; }
.card:nth-child(5) .card-value { color: #a29bfe; }

.bottom { flex-shrink: 0; margin-top: 12px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); }
</style>
</head>
<body>
<div class="white-border">
<div class="outer">
    <div class="title">OpenClaw 关键数据一览</div>
    <div class="subtitle">6周内成为GitHub历史增长最快的开源项目</div>
    <div class="cards">
        <div class="card">
            <div class="card-icon">⭐</div>
            <div class="card-label">GITHUB STARS</div>
            <div class="card-value">239K+</div>
            <div class="card-desc">6周内<br>GitHub史上最快</div>
        </div>
        <div class="card">
            <div class="card-icon">🧠</div>
            <div class="card-label">底层模型</div>
            <div class="card-value">Opus 4.5</div>
            <div class="card-desc">Anthropic<br>最强模型驱动</div>
        </div>
        <div class="card">
            <div class="card-icon">💸</div>
            <div class="card-label">月均成本</div>
            <div class="card-value">$300-750</div>
            <div class="card-desc">API费用<br>"比房租还贵"</div>
        </div>
        <div class="card">
            <div class="card-icon">🌐</div>
            <div class="card-label">AGENT社交</div>
            <div class="card-value">140万</div>
            <div class="card-desc">Moltbook上<br>自主社交的Agent</div>
        </div>
        <div class="card">
            <div class="card-icon">⚡</div>
            <div class="card-label">大厂响应</div>
            <div class="card-value">~2周</div>
            <div class="card-desc">Anthropic推出<br>Claude Cowork</div>
        </div>
    </div>
    <div class="bottom">数据截至 2026年3月 · 来源：GitHub / CNBC / Leonis Capital</div>
</div>
</div>
</body>
</html>
