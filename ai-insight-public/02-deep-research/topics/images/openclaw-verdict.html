<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1060px; height: 480px; overflow: hidden; background: #FFFFFF; }
.white-border { width: 1060px; height: 480px; padding: 20px; background: #FFFFFF; }
.outer {
    width: 1020px; height: 440px;
    background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
    border-radius: 16px; padding: 24px 28px;
    display: flex; flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff;
}
.title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 16px; }

.verdict {
    background: rgba(214,48,49,0.12); border: 1px solid rgba(214,48,49,0.3);
    border-radius: 12px; padding: 14px 20px; text-align: center; margin-bottom: 16px;
    flex-shrink: 0;
}
.verdict p { font-size: 14px; line-height: 1.6; }
.verdict strong { color: #ff7675; }

.two-col { display: flex; gap: 12px; flex: 1; }

.col {
    flex: 1; border-radius: 12px; padding: 14px;
    display: flex; flex-direction: column;
}
.col-good { background: rgba(5,150,105,0.12); border: 1px solid rgba(5,150,105,0.25); }
.col-bad { background: rgba(214,48,49,0.08); border: 1px solid rgba(214,48,49,0.2); }

.col-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.col-good .col-title { color: #55efc4; }
.col-bad .col-title { color: #ff7675; }

.col-item { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 8px; line-height: 1.5; }
.col-item strong { color: rgba(255,255,255,0.9); }

.futures { flex-shrink: 0; display: flex; gap: 8px; margin-top: 12px; }
.future {
    flex: 1; border-radius: 8px; padding: 10px;
    text-align: center; font-size: 12px;
    border: 1px solid rgba(255,255,255,0.08);
}
.future-a { background: rgba(5,150,105,0.1); }
.future-b { background: rgba(255,165,0,0.1); }
.future-c { background: rgba(37,99,235,0.1); }
.future-name { font-weight: 700; margin-bottom: 4px; }
.future-a .future-name { color: #55efc4; }
.future-b .future-name { color: #ffc048; }
.future-c .future-name { color: #74b9ff; }
.future-pct { font-size: 18px; font-weight: 800; }
.future-desc { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
</style>
</head>
<body>
<div class="white-border">
<div class="outer">
    <div class="title">🔮 终极判断</div>

    <div class="verdict">
        <p><strong>真正的赢家不是造最强Agent的公司，而是为AI员工构建最好"HR系统"的公司。</strong></p>
        <p style="margin-top:6px; font-size:12px; color:rgba(255,255,255,0.5);">小龙虾打开了大门，但走进去住下来的，会是另一批人。</p>
    </div>

    <div class="two-col">
        <div class="col col-good">
            <div class="col-title">✨ 做对了什么</div>
            <div class="col-item"><strong>数据主权</strong>：AI在你电脑上班</div>
            <div class="col-item"><strong>心跳架构</strong>：第一个自己会"上班"的AI</div>
            <div class="col-item"><strong>透明记忆</strong>：AI的笔记随时能翻看</div>
        </div>
        <div class="col col-bad">
            <div class="col-title">⚠️ 缺了什么</div>
            <div class="col-item"><strong>安全</strong>：没背调就给了全部权限</div>
            <div class="col-item"><strong>成本</strong>：员工薪水比工具栈还贵</div>
            <div class="col-item"><strong>可靠性</strong>：面试惊艳，入职后时好时坏</div>
        </div>
    </div>

    <div class="futures">
        <div class="future future-a">
            <div class="future-name">🏢 A：建HR体系</div>
            <div class="future-pct">40%</div>
            <div class="future-desc">唯一存活路径</div>
        </div>
        <div class="future future-b">
            <div class="future-name">🔄 B：被大厂吸收</div>
            <div class="future-pct">45%</div>
            <div class="future-desc">最可能</div>
        </div>
        <div class="future future-c">
            <div class="future-name">🌐 C：变猎头平台</div>
            <div class="future-pct">15%</div>
            <div class="future-desc">最难但最理想</div>
        </div>
    </div>
</div>
</div>
</body>
</html>
